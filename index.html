<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Bodega Alta Precisión</title>
    <style>
        :root { --gold: #f39c12; --bg: #000; --card: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; }
        .container { max-width: 100%; margin: auto; }
        h1 { color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        #status { color: #00ff00; font-weight: bold; text-align: center; margin-bottom: 20px; min-height: 50px; font-size: 16px; border: 2px solid #333; padding: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #080808; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .btn { padding: 22px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; font-size: 18px; width: 100%; text-transform: uppercase; }
        .btn-start { background: var(--gold); color: black; }
        .btn-start.active { background: #ff0000; color: white; box-shadow: 0 0 30px rgba(255,0,0,0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .btn-export { background: #27ae60; color: white; }
        .day-container { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .day-title { font-size: 13px; color: #888; margin-bottom: 12px; font-weight: bold; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px 5px; border-bottom: 1px solid #2a2a2a; }
        .wine-name { text-transform: uppercase; font-size: 15px; font-weight: 700; width: 55%; color: #eee; }
        .marks { color: var(--gold); letter-spacing: 5px; font-family: 'Courier New', monospace; font-size: 24px; text-align: center; }
        .total { text-align: right; font-weight: 900; color: var(--gold); width: 40px; font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍷 REGISTRO PRECISO</h1>
    <div id="status">SISTEMA PRONTO<br>Premi il tasto arancione</div>

    <div class="controls">
        <button id="micBtn" class="btn btn-start" onclick="toggleListening()">🎤 ATTIVA ASCOLTO</button>
        <button class="btn btn-export" onclick="exportToCSV()">📊 SCARICA EXCEL</button>
    </div>

    <div id="mainLog"></div>
</div>

<script>
    const MIEI_VINI = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "vérselo", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    let db = JSON.parse(localStorage.getItem('cantina_dati')) || {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 1000; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        const confidenza = event.results[event.results.length - 1][0].confidence;
        const hoy = new Date().toLocaleDateString('es-ES');
        
        // LOGICA DI CORRISPONDENZA ESATTA
        // Il sistema accetta la parola SOLO se è identica a una in lista
        if (MIEI_VINI.includes(result) && confidenza > 0.8) {
            if (!db[hoy]) db[hoy] = {};
            db[hoy][result] = (db[hoy][result] || 0) + 1;
            document.getElementById('status').innerHTML = `<span style="color:#00ff00">OK: ${result.toUpperCase()}</span>`;
            playBeep();
            localStorage.setItem('cantina_dati', JSON.stringify(db));
            render();
        } else {
            document.getElementById('status').innerHTML = `<span style="color:#ff0000">SCARTATO: "${result}"</span><br><small>Dì esattamente il nome</small>`;
        }
    };

    function render() {
        const log = document.getElementById('mainLog');
        log.innerHTML = "";
        const fechas = Object.keys(db).sort((a,b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));

        fechas.forEach(data => {
            let html = `<div class="day-container"><div class="day-title">DATA: ${data}</div><table>`;
            for (let v in db[data]) {
                html += `<tr><td class="wine-name">${v}</td><td class="marks">${"X".repeat(db[data][v])}</td><td class="total">${db[data][v]}</td></tr>`;
            }
            log.innerHTML += html + `</table></div>`;
        });
    }

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('active')) {
            recognition.stop(); btn.classList.remove('active'); btn.innerText = "🎤 ATTIVA ASCOLTO";
            document.getElementById('status').innerText = "SISTEMA IN PAUSA";
        } else {
            recognition.start(); btn.classList.add('active'); btn.innerText = "🛑 ASCOLTO ATTIVO";
            document.getElementById('status').innerText = "DÌ IL NOME DEL VINO...";
        }
    }

    function exportToCSV() {
        let csv = "Fecha;Vino;Cantidad\n";
        for (let d in db) for (let v in db[d]) csv += `${d};${v};${db[d][v]}\n`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "inventario_bodega.csv";
        link.click();
    }
    render();
</script>
</body>
</html>
