<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bodega Reveron - Registro</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; --red: #e74c3c; --green: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        /* Logo Stile Pulito */
        .header { text-align: center; margin: 20px 0; }
        .logo-text { color: white; font-size: 24px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .logo-sub { color: var(--gold); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }
        
        #status { font-size: 11px; text-align: center; margin-bottom: 15px; min-height: 30px; color: #888; text-transform: uppercase; }
        
        .btn-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #333; font-weight: 600; cursor: pointer; font-size: 13px; background: #1a1a1a; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-start.active { background: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(231, 76, 60, 0.4); }
        .btn-export { border-color: var(--green); color: var(--green); }
        
        .day-container { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #222; }
        .day-title { font-size: 11px; color: var(--gold); margin-bottom: 12px; font-weight: bold; opacity: 0.6; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; }
        .wine-name { text-transform: uppercase; font-size: 13px; font-weight: 600; color: #eee; width: 65%; }
        .marks { color: var(--gold); font-weight: bold; text-align: center; width: 10%; }
        .total { text-align: right; font-weight: 800; color: white; width: 40px; font-size: 18px; }

        .danger-zone { margin-top: 50px; text-align: center; padding: 20px; border-top: 1px solid #1a1a1a; }
        .btn-delete { background: transparent; color: #444; border: 1px solid #222; font-size: 10px; padding: 8px 12px; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p class="logo-text">REVERÓN</p>
        <p class="logo-sub">Bodegas desde 1947</p>
    </div>

    <div id="status">SISTEMA PRONTO</div>

    <div class="btn-group">
        <button id="micBtn" class="btn btn-start" onclick="toggleListening()">🎤 MIC</button>
        <button class="btn btn-export" onclick="exportToCSV()">📊 EXCEL</button>
    </div>

    <div id="mainLog"></div>

    <div class="danger-zone">
        <button class="btn btn-delete" onclick="clearData()">🗑️ Elimina tutti i contenuti</button>
    </div>
</div>

<script>
    const MIEI_VINI = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "vérselo", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    let db = JSON.parse(localStorage.getItem('cantina_dati')) || {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 1000; gain.gain.value = 0.05;
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        const hoy = new Date().toLocaleDateString('es-ES');
        
        if (MIEI_VINI.includes(result)) {
            if (!db[hoy]) db[hoy] = {};
            db[hoy][result] = (db[hoy][result] || 0) + 1;
            document.getElementById('status').innerHTML = `<span style="color:var(--green)">AGGIUNTO: ${result}</span>`;
            playBeep();
            localStorage.setItem('cantina_dati', JSON.stringify(db));
            render();
        } else {
            document.getElementById('status').innerHTML = `VOCE: "${result}" (NON IN LISTA)`;
        }
    };

    function render() {
        const log = document.getElementById('mainLog');
        log.innerHTML = "";
        const dates = Object.keys(db).sort((a,b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));
        
        dates.forEach(data => {
            let html = `<div class="day-container"><div class="day-title">${data}</div><table>`;
            for (let v in db[data]) {
                html += `<tr>
                    <td class="wine-name">${v}</td>
                    <td class="marks">X</td>
                    <td class="total">${db[data][v]}</td>
                </tr>`;
            }
            log.innerHTML += html + `</table></div>`;
        });
    }

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('active')) {
            recognition.stop(); btn.classList.remove('active'); btn.innerText = "🎤 MIC";
        } else {
            recognition.start(); btn.classList.add('active'); btn.innerText = "🛑 STOP";
        }
    }

    function clearData() {
        if (confirm("Vuoi cancellare tutto l'inventario?")) {
            db = {};
            localStorage.removeItem('cantina_dati');
            render();
            document.getElementById('status').innerText = "Memoria svuotata";
        }
    }

    function exportToCSV() {
        let csv = "Fecha;Vino;Cantidad\n";
        for (let d in db) for (let v in db[d]) csv += `${d};${v};${db[d][v]}\n`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "bodega_reveron.csv";
        link.click();
    }
    render();
</script>
</body>
</html>
