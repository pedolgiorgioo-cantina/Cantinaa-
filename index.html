<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bodegas Reverón | Registro Profesional</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-dark: #8e6d2d;
            --bg: #050505;
            --card: #121212;
            --text: #e0e0e0;
            --red: #ff4757;
            --green: #2ed573;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--bg);
            padding-bottom: 50px;
        }

        /* CABECERA MINIMALISTA */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #151515 0%, #050505 100%);
            border-bottom: 1px solid #222;
        }

        .logo-img {
            width: 180px;
            height: auto;
            filter: invert(1) brightness(1.5) contrast(1.2);
            margin-bottom: 10px;
        }

        .brand-subtitle {
            color: var(--gold);
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* PANEL DE ESTADO */
        .status-panel {
            padding: 20px;
            text-align: center;
            min-height: 60px;
        }

        #status-msg {
            font-size: 13px;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
        }

        /* BOTONES DE ACCIÓN */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px 30px;
        }

        .btn-main {
            border: 1px solid #333;
            padding: 15px 25px;
            border-radius: 50px;
            background: #111;
            color: white;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-mic.active {
            background: var(--red);
            border-color: var(--red);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* LISTA DE VINOS (HELP) */
        .wine-helper {
            padding: 0 20px 20px;
        }

        details {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid #222;
        }

        summary {
            padding: 15px;
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            list-style: none;
            cursor: pointer;
        }

        .wine-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border-top: 1px solid #222;
            font-size: 11px;
            color: #777;
        }

        /* REGISTROS DIARIOS */
        .log-section {
            padding: 0 20px;
        }

        .day-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .day-header {
            color: var(--gold);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            text-align: center;
        }

        .entry-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .entry-name {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            flex: 1;
        }

        .entry-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-minus {
            background: #222;
            border: 1px solid #333;
            color: #555;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .entry-qty {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            min-width: 25px;
            text-align: center;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            padding: 20px;
            opacity: 0.3;
        }

        .btn-clear {
            background: none;
            border: none;
            color: white;
            font-size: 10px;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="logo.png" alt="Bodegas Reverón" class="logo-img" onerror="this.style.display='none';">
        <div class="brand-subtitle">Inventario de Almacén</div>
    </div>

    <div class="status-panel">
        <div id="status-msg">Listo para registrar</div>
    </div>

    <div class="controls">
        <button id="micBtn" class="btn-main btn-mic" onclick="toggleListening()">
            <span>🎤</span> <span id="btnText">ACTIVAR MIC</span>
        </button>
        <button class="btn-main" onclick="exportToCSV()" style="border-color: var(--green); color: var(--green);">
            <span>📊</span> EXCEL
        </button>
    </div>

    <div class="wine-helper">
        <details>
            <summary>CATÁLOGO DE REFERENCIA</summary>
            <div id="wine-list" class="wine-grid"></div>
        </details>
    </div>

    <div id="main-log" class="log-section"></div>

    <div class="footer">
        <button class="btn-clear" onclick="clearAll()">BORRAR TODO EL REGISTRO</button>
    </div>
</div>

<script>
    const VINOS = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "verdello", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    // Cargar datos
    let db = JSON.parse(localStorage.getItem('bodega_db')) || {};

    // Iniciar catálogo
    const grid = document.getElementById('wine-list');
    [...VINOS].sort().forEach(v => grid.innerHTML += `<div>• ${v.toUpperCase()}</div>`);

    // Audio de confirmación
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(success = true) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = success ? 880 : 220;
        gain.gain.value = 0.03;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // Reconocimiento de Voz
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        const hoy = new Date().toLocaleDateString('es-ES');
        
        if (VINOS.includes(result)) {
            if (!db[hoy]) db[hoy] = {};
            db[hoy][result] = (db[hoy][result] || 0) + 1;
            document.getElementById('status-msg').innerHTML = `<span style="color:var(--green)">+1 ${result}</span>`;
            beep(true);
            save();
            render();
        } else {
            document.getElementById('status-msg').innerHTML = `<span style="color:#666">"${result}" no detectado</span>`;
            beep(false);
        }
    };

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        const txt = document.getElementById('btnText');
        if (btn.classList.contains('active')) {
            recognition.stop();
            btn.classList.remove('active');
            txt.innerText = "ACTIVAR MIC";
        } else {
            recognition.start();
            btn.classList.add('active');
            txt.innerText = "DETENER";
        }
    }

    function removeOne(fecha, vino) {
        if (db[fecha][vino] > 0) {
            db[fecha][vino]--;
            if (db[fecha][vino] === 0) delete db[fecha][vino];
            save();
            render();
        }
    }

    function save() { localStorage.setItem('bodega_db', JSON.stringify(db)); }

    function render() {
        const log = document.getElementById('main-log');
        log.innerHTML = "";
        const dates = Object.keys(db).sort((a,b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));
        
        dates.forEach(d => {
            let html = `<div class="day-card"><div class="day-header">${d}</div>`;
            const sortedVinos = Object.keys(db[d]).sort();
            sortedVinos.forEach(v => {
                html += `
                <div class="entry-row">
                    <div class="entry-name">${v}</div>
                    <div class="entry-controls">
                        <button class="btn-minus" onclick="removeOne('${d}', '${v}')">−</button>
                        <div class="entry-qty">${db[d][v]}</div>
                    </div>
                </div>`;
            });
            log.innerHTML += html + `</div>`;
        });
    }

    function exportToCSV() {
        let csv = "sep=;\nFecha;Articulo;Cantidad\n";
        for (let d in db) for (let v in db[d]) csv += `${d};${v.toUpperCase()};${db[d][v]}\n`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Inventario_Reveron.csv`;
        link.click();
    }

    function clearAll() {
        if (confirm("¿Eliminar todos los registros permanentemente?")) {
            db = {}; save(); render();
        }
    }

    render();
</script>
</body>
</html>
