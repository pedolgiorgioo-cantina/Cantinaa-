<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Bodega Oficial</title>
    <style>
        :root { --gold: #f39c12; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; }
        .container { max-width: 100%; margin: auto; }
        h1 { color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        #status { color: #f39c12; font-weight: bold; text-align: center; margin-bottom: 20px; min-height: 24px; font-size: 14px; border: 1px solid #333; padding: 10px; border-radius: 8px; background: #1a1a1a; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; }
        .btn-start { background: var(--gold); color: black; }
        .btn-start.active { background: #e74c3c; color: white; box-shadow: 0 0 20px #e74c3c; }
        .btn-export { background: #27ae60; color: white; }
        .day-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .day-title { font-size: 14px; color: var(--gold); margin-bottom: 10px; font-weight: bold; opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #2a2a2a; font-size: 16px; }
        .wine-name { text-transform: capitalize; font-weight: bold; width: 50%; }
        .marks { color: var(--gold); letter-spacing: 3px; font-family: monospace; font-size: 18px; text-align: center; }
        .total { text-align: right; font-weight: bold; color: #fff; width: 40px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍷 REGISTRO BODEGA</h1>
    <div id="status">Microfono listo</div>

    <div class="controls">
        <button id="micBtn" class="btn btn-start" onclick="toggleListening()">🎤 ACTIVAR MICRÓFONO</button>
        <button class="btn btn-export" onclick="exportToCSV()">📊 DESCARGAR EXCEL</button>
    </div>

    <div id="mainLog"></div>
</div>

<script>
    // --- TU LISTA OFICIAL DE VINOS ---
    const MIEI_VINI = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "vérselo", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    let db = JSON.parse(localStorage.getItem('cantina_dati')) || {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 900; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; // Configurado en español para tu lista
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase();
        const hoy = new Date().toLocaleDateString('es-ES');
        if (!db[hoy]) db[hoy] = {};

        let encontrado = false;
        MIEI_VINI.forEach(vino => {
            if (result.includes(vino)) {
                db[hoy][vino] = (db[hoy][vino] || 0) + 1;
                document.getElementById('status').innerText = "REGISTRADO: " + vino.toUpperCase();
                playBeep();
                encontrado = true;
            }
        });

        if (!encontrado) {
            document.getElementById('status').innerText = "Vino no reconocido...";
        }

        localStorage.setItem('cantina_dati', JSON.stringify(db));
        render();
    };

    function render() {
        const log = document.getElementById('mainLog');
        log.innerHTML = "";
        const fechas = Object.keys(db).sort((a,b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));

        fechas.forEach(data => {
            let html = `<div class="day-container"><div class="day-title">FECHA: ${data}</div><table>`;
            for (let v in db[data]) {
                html += `<tr><td class="wine-name">${v}</td><td class="marks">${"X".repeat(db[data][v])}</td><td class="total">${db[data][v]}</td></tr>`;
            }
            log.innerHTML += html + `</table></div>`;
        });
    }

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('active')) {
            recognition.stop(); btn.classList.remove('active'); btn.innerText = "🎤 ACTIVAR MICRÓFONO";
        } else {
            recognition.start(); btn.classList.add('active'); btn.innerText = "🛑 ESCUCHANDO...";
        }
    }

    function exportToCSV() {
        let csv = "Fecha;Vino;Cantidad\n";
        for (let d in db) for (let v in db[d]) csv += `${d};${v};${db[d][v]}\n`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "inventario_bodega.csv";
        link.click();
    }
    render();
</script>
</body>
</html>
