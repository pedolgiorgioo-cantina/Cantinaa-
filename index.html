<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bodegas Reverón | Gestión de Existencias</title>
    <style>
        :root {
            --gold: #c5a059;
            --bg: #050505;
            --card: #121212;
            --text: #e0e0e0;
            --blue: #3498db;  /* Entradas */
            --green: #2ecc71; /* Ventas */
            --red: #e74c3c;   /* Bajas/Roturas */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 10px;
        }

        .container { max-width: 500px; margin: auto; }

        .header {
            text-align: center; padding: 25px 0;
            background: linear-gradient(180deg, #111 0%, #050505 100%);
            border-bottom: 1px solid #222; border-radius: 0 0 20px 20px;
        }
        .logo-img { width: 160px; filter: invert(1) brightness(1.5); }

        /* SELEZIONE OPERAZIONE */
        .mode-selector {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin: 20px 0;
        }
        .mode-btn {
            padding: 12px 5px; border-radius: 10px; border: 1px solid #333;
            background: #111; color: #777; font-size: 10px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .mode-btn.active[data-mode="ENTRADA"] { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 0 15px rgba(52,152,219,0.3); }
        .mode-btn.active[data-mode="VENTA"] { background: var(--green); color: white; border-color: var(--green); box-shadow: 0 0 15px rgba(46,204,113,0.3); }
        .mode-btn.active[data-mode="BAJA"] { background: var(--red); color: white; border-color: var(--red); box-shadow: 0 0 15px rgba(231,76,60,0.3); }

        /* MIC E STATO */
        .mic-section { text-align: center; margin-bottom: 25px; }
        #status-msg { font-size: 12px; color: var(--gold); margin-bottom: 15px; height: 20px; letter-spacing: 1px; }
        .btn-mic {
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #333;
            background: #1a1a1a; font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        .btn-mic.recording { border-color: var(--red); background: #300; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* TABELLE REGISTRO */
        .day-card {
            background: var(--card); border-radius: 15px; padding: 15px;
            margin-bottom: 20px; border: 1px solid #222;
        }
        .day-title { color: var(--gold); font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: #555; font-size: 10px; text-align: left; padding: 5px; text-transform: uppercase; }
        td { padding: 10px 5px; border-bottom: 1px solid #1a1a1a; }
        
        .col-vino { text-transform: uppercase; font-weight: 500; width: 50%; }
        .col-mode { font-size: 10px; font-weight: bold; }
        .mode-E { color: var(--blue); } .mode-V { color: var(--green); } .mode-B { color: var(--red); }
        .col-qty { font-weight: bold; text-align: right; color: var(--white); font-size: 16px; }

        .btn-export {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Bodegas Reverón" class="logo-img" onerror="this.style.display='none';">
        <div style="color:var(--gold); font-size:9px; letter-spacing:4px; margin-top:5px;">CONTROL DE MOVIMIENTOS</div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" data-mode="VENTA" onclick="setMode('VENTA')">📦 Venta<br>(Salida)</button>
        <button class="mode-btn" data-mode="ENTRADA" onclick="setMode('ENTRADA')">📥 Entrada<br>(Caja)</button>
        <button class="mode-btn" data-mode="BAJA" onclick="setMode('BAJA')">🗑️ Baja<br>(Rotura)</button>
    </div>

    <div class="mic-section">
        <div id="status-msg">LISTO</div>
        <button id="micBtn" class="btn-mic" onclick="toggleMic()">🎤</button>
    </div>

    <div id="log-container"></div>

    <button class="btn-export" onclick="exportToCSV()">📊 DESCARGAR EXCEL (SAGE)</button>
    
    <div style="text-align:center; margin-top:40px;">
        <button onclick="clearAll()" style="background:none; border:none; color:#333; font-size:10px; text-decoration:underline;">BORRAR TODO IL REGISTRO</button>
    </div>
</div>

<script>
    const VINOS = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "verdello", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    let db = JSON.parse(localStorage.getItem('bodega_pro_db')) || [];
    let currentMode = "VENTA";

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
    }

    function toggleMic() {
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('recording')) {
            recognition.stop();
            btn.classList.remove('recording');
            document.getElementById('status-msg').innerText = "PAUSADO";
        } else {
            recognition.start();
            btn.classList.add('recording');
            document.getElementById('status-msg').innerText = "ESCUCHANDO " + currentMode + "...";
        }
    }

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        
        if (VINOS.includes(result)) {
            const entry = {
                fecha: new Date().toLocaleDateString('es-ES'),
                hora: new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}),
                vino: result,
                tipo: currentMode,
                cantidad: currentMode === "ENTRADA" ? 6 : 1 // 6 si es caja, 1 si es venta/baja
            };
            db.unshift(entry);
            save();
            render();
            document.getElementById('status-msg').innerHTML = `<span style="color:var(--green)">REGISTRADO: ${result}</span>`;
        } else {
            document.getElementById('status-msg').innerHTML = `<span style="color:var(--red)">"${result}" NO RECONOCIDO</span>`;
        }
    };

    function save() { localStorage.setItem('bodega_pro_db', JSON.stringify(db)); }

    function render() {
        const container = document.getElementById('log-container');
        container.innerHTML = "";
        
        // Raggruppa per data
        const groups = db.reduce((acc, item) => {
            if (!acc[item.fecha]) acc[item.fecha] = [];
            acc[item.fecha].push(item);
            return acc;
        }, {});

        for (let date in groups) {
            let html = `<div class="day-card"><div class="day-title">${date}</div><table>`;
            html += `<tr><th>Hora</th><th>Vino</th><th>Tipo</th><th>Cant.</th></tr>`;
            groups[date].forEach(item => {
                const modeClass = item.tipo === 'ENTRADA' ? 'mode-E' : (item.tipo === 'VENTA' ? 'mode-V' : 'mode-B');
                const modeSymbol = item.tipo === 'ENTRADA' ? '📥' : (item.tipo === 'VENTA' ? '📦' : '🗑️');
                html += `<tr>
                    <td style="color:#666; font-size:11px;">${item.hora}</td>
                    <td class="col-vino">${item.vino}</td>
                    <td class="col-mode ${modeClass}">${modeSymbol} ${item.tipo}</td>
                    <td class="col-qty">${item.cantidad}</td>
                </tr>`;
            });
            container.innerHTML += html + "</table></div>";
        }
    }

    function exportToCSV() {
        let csv = "sep=;\nFecha;Hora;Vino;Operacion;Cantidad\n";
        db.forEach(i => {
            csv += `${i.fecha};${i.hora};${i.vino.toUpperCase()};${i.tipo};${i.cantidad}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Inventario_Reveron_Sage.csv`;
        link.click();
    }

    function clearAll() { if(confirm("¿Borrar todo?")) { db = []; save(); render(); } }

    render();
</script>
</body>
</html>
