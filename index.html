<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro Vocale Mobile</title>
    <style>
        :root { --gold: #f39c12; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; font-size: 18px; }
        .container { max-width: 100%; margin: auto; }
        h1 { color: var(--gold); font-size: 24px; text-align: center; }
        #status { color: #888; font-size: 14px; text-align: center; margin-bottom: 20px; height: 20px; }
        
        /* PULSANTI GRANDI PER CELLULARE */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .btn { padding: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%; }
        .btn-start { background: var(--gold); color: black; }
        .btn-start.active { background: #e74c3c; color: white; box-shadow: 0 0 15px #e74c3c; }
        .btn-export { background: #27ae60; color: white; }
        
        .day-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .day-title { font-size: 16px; color: var(--gold); margin-bottom: 10px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #2a2a2a; font-size: 18px; }
        .marks { color: var(--gold); letter-spacing: 2px; font-family: monospace; font-size: 22px; }
        .total { text-align: right; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍷 REGISTRO VOCALE</h1>
    <div id="status">Pronto</div>

    <div class="controls">
        <button id="micBtn" class="btn btn-start" onclick="toggleListening()">🎤 ATTIVA MICROFONO</button>
        <button class="btn btn-export" onclick="exportToCSV()">📊 SCARICA EXCEL</button>
    </div>

    <div id="mainLog"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cantina_dati')) || {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'it-IT';
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        document.getElementById('status').innerText = "Sentito: " + result;
        playBeep();
        saveEntry(result);
    };

    function saveEntry(nome) {
        const oggi = new Date().toLocaleDateString('it-IT');
        if (!db[oggi]) db[oggi] = {};
        db[oggi][nome] = (db[oggi][nome] || 0) + 1;
        localStorage.setItem('cantina_dati', JSON.stringify(db));
        render();
    }

    function render() {
        const log = document.getElementById('mainLog');
        log.innerHTML = "";
        Object.keys(db).reverse().forEach(data => {
            let html = `<div class="day-container"><div class="day-title">${data}</div><table>`;
            for (let b in db[data]) {
                html += `<tr><td><b>${b}</b></td><td class="marks">${"X".repeat(db[data][b])}</td><td class="total">${db[data][b]}</td></tr>`;
            }
            log.innerHTML += html + `</table></div>`;
        });
    }

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('active')) {
            recognition.stop(); btn.classList.remove('active'); btn.innerText = "🎤 ATTIVA MICROFONO";
        } else {
            recognition.start(); btn.classList.add('active'); btn.innerText = "🛑 ASCOLTO...";
        }
    }

    function exportToCSV() {
        let csv = "Data;Bottiglia;Quantita\n";
        for (let d in db) for (let b in db[d]) csv += `${d};${b};${db[d][b]}\n`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "inventario.csv";
        link.click();
    }
    render();
</script>
</body>
</html>
