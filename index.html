<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bodegas Reverón - Registro de Inventario</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; --red: #ff4757; --green: #2ed573; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        
        /* LOGO EN CABECERA CON IMAGEN INCRUSTADA */
        .header { text-align: center; padding: 20px 0; background: #000; margin-bottom: 15px; border-radius: 0 0 15px 15px; }
        .logo-img { 
            width: 180px; 
            height: auto; 
            /* Filtro para hacer el logo negro blanco y brillante */
            filter: invert(1) grayscale(1) brightness(1.8); 
        }
        
        #status { font-size: 11px; text-align: center; margin-bottom: 15px; min-height: 35px; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 0 10px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: 1px solid #333; font-weight: 700; cursor: pointer; font-size: 13px; background: #1a1a1a; color: white; display: flex; align-items: center; gap: 8px; text-transform: uppercase; transition: all 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-start.active { background: var(--red); border-color: var(--red); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn-export { border-color: var(--green); color: var(--green); }
        
        .day-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }
        .day-title { font-size: 11px; color: var(--gold); margin-bottom: 12px; font-weight: bold; opacity: 0.7; text-align: center; border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 5px; border-bottom: 1px solid #222; }
        .wine-name { text-transform: uppercase; font-size: 13px; font-weight: 600; color: #fff; width: 65%; }
        .marks { color: var(--gold); font-weight: bold; text-align: center; font-size: 18px; width: 10%; }
        .total { text-align: right; font-weight: 800; color: var(--gold); width: 45px; font-size: 20px; }

        .danger-zone { margin-top: 60px; text-align: center; padding: 20px; border-top: 1px dashed #333; }
        .btn-delete { background: transparent; color: #555; border: 1px solid #222; font-size: 10px; padding: 10px 15px; text-transform: uppercase; border-radius: 6px; letter-spacing: 1px; }
        .btn-delete:active { background: #333; color: #eee; }
    </style>
</head>
<body>

    </div>

    <div id="status">SISTEMA EN ESPERA</div>

    <div class="btn-group">
        <button id="micBtn" class="btn btn-start" onclick="toggleListening()">🎤 ACTIVAR MIC</button>
        <button class="btn btn-export" onclick="exportToCSV()">📊 EXCEL</button>
    </div>

    <div id="mainLog"></div>

    <div class="danger-zone">
        <button class="btn btn-delete" onclick="clearData()">🗑️ Borrar Todo el Registro</button>
    </div>
</div>

<script>
    const MIEI_VINI = [
        "blanco tradicional", "blanco afrutado", "crianza 2022", "crianza 2019", 
        "crianza 2016", "listan blanco barrica", "malvasía aromática", "tinto joven", 
        "albillo criollo barrica", "albillo criollo joven", "los quemados", 
        "baboso negro", "blanco reveron", "vérselo", "tinto barrica", 
        "rosado afrutado", "naturalmente dulce"
    ];

    let db = JSON.parse(localStorage.getItem('cantina_dati')) || {};
    // Verificación y corrección de la estructura de datos antigua (si existe)
    // Esto asegura que cada entrada sea {vino: cantidad} y no {vino: X...}
    function fixLegacyData() {
        let needsFix = false;
        for (let date in db) {
            for (let wine in db[date]) {
                if (typeof db[date][wine] === 'string') {
                    // Si encontramos una 'X', la convertimos al número de 'X's
                    db[date][wine] = db[date][wine].length;
                    needsFix = true;
                }
            }
        }
        if (needsFix) {
            localStorage.setItem('cantina_dati', JSON.stringify(db));
        }
    }
    fixLegacyData();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 1000; gain.gain.value = 0.05;
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        const hoy = new Date().toLocaleDateString('es-ES');
        
        if (MIEI_VINI.includes(result)) {
            if (!db[hoy]) db[hoy] = {};
            // Sumamos 1 a la cantidad numérica
            db[hoy][result] = (db[hoy][result] || 0) + 1;
            document.getElementById('status').innerHTML = `<span style="color:var(--green)">✓ REGISTRADO: ${result}</span>`;
            playBeep();
            localStorage.setItem('cantina_dati', JSON.stringify(db));
            render();
        } else {
            document.getElementById('status').innerHTML = `VOZ: "${result}" <br><small>(no reconocido)</small>`;
        }
    };

    function render() {
        const log = document.getElementById('mainLog');
        log.innerHTML = "";
        const dates = Object.keys(db).sort((a,b) => new Date(b.split('/').reverse().join('-')) - new Date(a.split('/').reverse().join('-')));
        
        dates.forEach(data => {
            let html = `<div class="day-container"><div class="day-title">FECHA: ${data}</div><table>`;
            // Ordenar vinos alfabéticamente para facilitar la lectura
            const sortedWines = Object.keys(db[data]).sort();
            
            sortedWines.forEach(v => {
                const quantity = db[data][v];
                html += `<tr>
                    <td class="wine-name">${v}</td>
                    <td class="marks">X</td>
                    <td class="total">${quantity}</td>
                </tr>`;
            });
            log.innerHTML += html + `</table></div>`;
        });
    }

    function toggleListening() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const btn = document.getElementById('micBtn');
        if (btn.classList.contains('active')) {
            recognition.stop(); btn.classList.remove('active'); btn.innerText = "🎤 ACTIVAR MIC";
            document.getElementById('status').innerText = "SISTEMA EN ESPERA";
        } else {
            recognition.start(); btn.classList.add('active'); btn.innerText = "🛑 PARAR MIC";
            document.getElementById('status').innerText = "ESCUCHANDO...";
        }
    }

    function clearData() {
        if (confirm("¿Seguro que quieres borrar todo el historial de botellas registradas?")) {
            db = {};
            localStorage.removeItem('cantina_dati');
            render();
            document.getElementById('status').innerText = "REGISTRO VACÍO";
        }
    }

    function exportToCSV() {
        if (Object.keys(db).length === 0) {
            alert("No hay datos para exportar.");
            return;
        }
        let csv = "Fecha;Vino;Cantidad\n";
        for (let d in db) {
            for (let v in db[d]) {
                csv += `${d};${v};${db[d][v]}\n`;
            }
        }
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Inventario_BodegasReveron.csv";
        link.click();
    }
    
    // Renderizado inicial
    render();
</script>
</body>
